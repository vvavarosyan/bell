<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign in · Bell Data Intelligence</title>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: radial-gradient(ellipse 60% 50% at 50% 0%, rgba(91,140,255,0.18) 0%, transparent 65%), var(--bg); }
    .auth-page { width: 100%; max-width: 420px; padding: 32px 24px; }
    .auth-brand { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 26px; }
    .auth-brand-mark { width: 36px; height: 36px; border-radius: 8px;
      background: linear-gradient(135deg, rgb(91 140 255) 0%, rgb(165 195 255) 100%);
      display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 13px; letter-spacing: .06em; }
    .auth-brand-text { color: var(--text); font-weight: 600; font-size: 15px; }
    .auth-card { background: rgba(19,24,41,0.5); border: 1px solid var(--border); border-radius: 16px; padding: 28px 26px; }
    .auth-title { font-size: 21px; font-weight: 700; color: var(--text); margin: 0 0 5px; text-align: center; }
    .auth-subtitle { font-size: 13px; color: var(--text-muted); margin: 0 0 22px; text-align: center; }
    .auth-form { display: flex; flex-direction: column; gap: 14px; }
    .auth-field label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 6px; font-weight: 600; }
    .auth-input { width: 100%; box-sizing: border-box; background: var(--bg-elev-2); border: 1px solid var(--border);
      border-radius: 9px; color: var(--text); font: inherit; font-size: 14px; padding: 11px 13px;
      transition: border-color .15s ease, box-shadow .15s ease; }
    .auth-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-fade); }
    .auth-btn { width: 100%; background: var(--accent); color: #fff; border: 0; border-radius: 9px; padding: 12px;
      font: inherit; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 4px; transition: filter .15s ease; }
    .auth-btn:hover { filter: brightness(1.1); }
    .auth-btn:disabled { opacity: .6; cursor: default; }
    .auth-error { background: rgba(255,90,90,.1); border: 1px solid rgba(255,90,90,.4); color: #ff8a8a;
      font-size: 12.5px; padding: 9px 12px; border-radius: 8px; }
    .auth-row { display: flex; justify-content: flex-end; }
    .auth-link { background: none; border: 0; color: var(--accent-bright); cursor: pointer; font: inherit; font-size: 12px; padding: 0; text-decoration: none; }
    .auth-foot { margin-top: 18px; font-size: 12px; color: var(--text-dim); text-align: center; }
    .auth-foot a { color: var(--accent-bright); text-decoration: none; }
    .auth-hidden { display: none; }
    .auth-loading { text-align: center; color: var(--text-dim); font-size: 13px; padding: 30px 0; }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-brand">
      <div class="auth-brand-mark">BDI</div>
      <div class="auth-brand-text">Bell Data Intelligence</div>
    </div>

    <div class="auth-card" id="card">
      <div class="auth-loading" id="boot">Loading…</div>

      <!-- Sign in -->
      <div id="view-signin" class="auth-hidden">
        <h1 class="auth-title">Sign in</h1>
        <p class="auth-subtitle">Welcome back to your Bell workspace.</p>
        <form class="auth-form" id="form-signin">
          <div class="auth-error auth-hidden" id="err-signin"></div>
          <div class="auth-field"><label>Email</label><input class="auth-input" id="si-email" type="email" autocomplete="email" required /></div>
          <div class="auth-field"><label>Password</label><input class="auth-input" id="si-password" type="password" autocomplete="current-password" required /></div>
          <div class="auth-row"><button type="button" class="auth-link" id="to-reset">Forgot password?</button></div>
          <button class="auth-btn" id="si-submit" type="submit">Sign in</button>
        </form>
      </div>

      <!-- Reset password -->
      <div id="view-reset" class="auth-hidden">
        <h1 class="auth-title">Reset password</h1>
        <p class="auth-subtitle" id="reset-sub">Enter your email and we'll send you a code.</p>
        <form class="auth-form" id="form-reset">
          <div class="auth-error auth-hidden" id="err-reset"></div>
          <div class="auth-field"><label>Email</label><input class="auth-input" id="rs-email" type="email" autocomplete="email" required /></div>
          <div class="auth-field auth-hidden" id="rs-code-field"><label>Verification code</label><input class="auth-input" id="rs-code" inputmode="numeric" autocomplete="one-time-code" /></div>
          <div class="auth-field auth-hidden" id="rs-newpass-field"><label>New password</label><input class="auth-input" id="rs-newpass" type="password" autocomplete="new-password" /></div>
          <button class="auth-btn" id="rs-submit" type="submit">Send code</button>
          <div class="auth-row" style="justify-content:center"><button type="button" class="auth-link" id="back-signin">Back to sign in</button></div>
        </form>
      </div>

      <!-- Fallback (Clerk component) -->
      <div id="clerk-fallback" class="auth-hidden auth-mount"></div>
    </div>

    <p class="auth-foot">New to Bell? <a href="/sign-up">Create an account</a></p>
  </div>

  <script>
    (async function () {
      const $ = (id) => document.getElementById(id);
      const show = (id) => $(id).classList.remove('auth-hidden');
      const hide = (id) => $(id).classList.add('auth-hidden');
      const showErr = (id, msg) => { const e = $(id); e.textContent = msg; e.classList.remove('auth-hidden'); };
      const clerkErr = (e) => (e && (e.errors?.[0]?.longMessage || e.errors?.[0]?.message)) || e?.message || 'Something went wrong. Please try again.';
      const go = (url) => window.location.replace(url);

      let mode;
      try { mode = await (await fetch('/api/auth/mode')).json(); }
      catch { $('boot').textContent = 'Could not reach the server. Please refresh.'; return; }
      if (mode.mode === 'local-admin' || !mode.auth_required) return go('/');
      if (!mode.publishable_key) { $('boot').textContent = 'Sign-in not configured (CLERK_PUBLISHABLE_KEY missing).'; return; }

      // Load Clerk JS SDK
      const s = document.createElement('script');
      s.async = true; s.crossOrigin = 'anonymous';
      s.setAttribute('data-clerk-publishable-key', mode.publishable_key);
      s.src = 'https://cdn.jsdelivr.net/npm/@clerk/clerk-js@5/dist/clerk.browser.js';
      s.onerror = () => { $('boot').textContent = 'Failed to load sign-in (network).'; };
      s.onload = async () => {
        try {
          await window.Clerk.load();
          if (window.Clerk.user) return go('/');
          hide('boot'); show('view-signin');
        } catch (e) { $('boot').textContent = clerkErr(e); }
      };
      document.head.appendChild(s);

      const fallback = () => {
        ['view-signin', 'view-reset'].forEach(hide);
        show('clerk-fallback');
        try { window.Clerk.mountSignIn($('clerk-fallback'), { afterSignInUrl: '/', signUpUrl: '/sign-up' }); } catch (e) {}
      };

      // ---- Sign in ----
      $('form-signin').addEventListener('submit', async (ev) => {
        ev.preventDefault(); hide('err-signin');
        const btn = $('si-submit'); btn.disabled = true; btn.textContent = 'Signing in…';
        const password = $('si-password').value;
        try {
          let res = await window.Clerk.client.signIn.create({ identifier: $('si-email').value.trim(), password });
          // Some Clerk configs don't complete inline — they return needs_first_factor
          // and expect the password to be attempted explicitly. Do that here.
          if (res.status === 'needs_first_factor') {
            const hasPw = (res.supportedFirstFactors || []).some((f) => f.strategy === 'password');
            if (hasPw) res = await window.Clerk.client.signIn.attemptFirstFactor({ strategy: 'password', password });
          }
          if (res.status === 'complete') { await window.Clerk.setActive({ session: res.createdSessionId }); return go('/'); }
          fallback();   // genuine multi-step (e.g., two-factor) — let Clerk's UI finish it
        } catch (e) { showErr('err-signin', clerkErr(e)); }
        finally { btn.disabled = false; btn.textContent = 'Sign in'; }
      });

      $('to-reset').addEventListener('click', () => { hide('view-signin'); show('view-reset'); });
      $('back-signin').addEventListener('click', () => { hide('view-reset'); show('view-signin'); });

      // ---- Reset password (email code) ----
      let resetStage = 'email';
      $('form-reset').addEventListener('submit', async (ev) => {
        ev.preventDefault(); hide('err-reset');
        const btn = $('rs-submit'); btn.disabled = true;
        try {
          if (resetStage === 'email') {
            btn.textContent = 'Sending…';
            const si = await window.Clerk.client.signIn.create({ identifier: $('rs-email').value.trim() });
            const f = (si.supportedFirstFactors || []).find((x) => x.strategy === 'reset_password_email_code');
            if (!f) { showErr('err-reset', 'Password reset by email is not available for this account.'); return; }
            await window.Clerk.client.signIn.prepareFirstFactor({ strategy: 'reset_password_email_code', emailAddressId: f.emailAddressId });
            resetStage = 'code';
            $('reset-sub').textContent = 'Enter the code we emailed you and a new password.';
            show('rs-code-field'); show('rs-newpass-field');
            btn.textContent = 'Reset password';
          } else {
            btn.textContent = 'Resetting…';
            const att = await window.Clerk.client.signIn.attemptFirstFactor({ strategy: 'reset_password_email_code', code: $('rs-code').value.trim() });
            if (att.status === 'needs_new_password') {
              const done = await window.Clerk.client.signIn.resetPassword({ password: $('rs-newpass').value });
              if (done.status === 'complete') { await window.Clerk.setActive({ session: done.createdSessionId }); return go('/'); }
            } else if (att.status === 'complete') { await window.Clerk.setActive({ session: att.createdSessionId }); return go('/'); }
            fallback();
          }
        } catch (e) { showErr('err-reset', clerkErr(e)); }
        finally { btn.disabled = false; }
      });
    })();
  </script>
</body>
</html>
