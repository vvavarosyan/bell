<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Subscribe · Bell Data Intelligence</title>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(ellipse 70% 50% at 50% 0%, rgba(91,140,255,0.18) 0%, transparent 65%),
        var(--bg);
      padding: 40px 20px;
    }
    .sub-wrap { max-width: 1100px; margin: 0 auto; }
    .sub-brand { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; }
    .sub-brand-mark { width: 36px; height: 36px; border-radius: 8px;
      background: linear-gradient(135deg, rgb(91 140 255) 0%, rgb(165 195 255) 100%);
      display: flex; align-items: center; justify-content: center;
      color: white; font-weight: 700; font-size: 13px; letter-spacing: 0.06em; }
    .sub-brand-text { color: var(--text); font-weight: 600; font-size: 14px; }
    .sub-header { text-align: center; margin: 24px 0 36px; }
    .sub-eyebrow { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.14em;
      color: var(--text-dim); font-weight: 700; margin-bottom: 12px; }
    .sub-title { font-size: 28px; font-weight: 600; color: var(--text); margin: 0 0 8px; }
    .sub-subtitle { font-size: 14px; color: var(--text-muted); max-width: 560px; margin: 0 auto; line-height: 1.6; }
    .plan-grid { display: grid; gap: 16px; grid-template-columns: repeat(3, 1fr); margin-bottom: 36px; }
    @media (max-width: 880px) { .plan-grid { grid-template-columns: 1fr; } }
    .plan-card {
      background: linear-gradient(180deg, rgba(19,24,41,.94) 0%, rgba(13,18,35,.94) 100%);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      display: flex; flex-direction: column;
      position: relative;
    }
    .plan-card.featured {
      border-color: rgba(91,140,255,0.45);
      box-shadow: 0 14px 36px -16px rgba(91,140,255,0.35);
    }
    .plan-badge {
      position: absolute; top: -10px; right: 20px;
      background: var(--accent); color: white;
      font-size: 9.5px; font-weight: 700; padding: 4px 10px;
      border-radius: 999px; letter-spacing: 0.08em; text-transform: uppercase;
    }
    .plan-name { font-size: 13px; font-weight: 700; color: var(--accent-bright);
      text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
    .plan-price { font-size: 32px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
    .plan-price .currency { font-size: 14px; font-weight: 500; color: var(--text-muted); margin-right: 6px; }
    .plan-price .interval { font-size: 13px; font-weight: 400; color: var(--text-muted); margin-left: 4px; }
    .plan-tagline { font-size: 12.5px; color: var(--text-muted); line-height: 1.5; margin-bottom: 20px; }
    .plan-features { list-style: none; padding: 0; margin: 0 0 24px; flex: 1; }
    .plan-features li { font-size: 12.5px; color: var(--text); padding: 6px 0; padding-left: 22px;
      position: relative; line-height: 1.5; }
    .plan-features li::before {
      content: '✓'; color: var(--accent-bright); position: absolute; left: 0; top: 6px;
      font-weight: 700;
    }
    .plan-cta {
      width: 100%;
      background: var(--accent); border: 1px solid var(--accent);
      color: white; padding: 12px; border-radius: 10px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      transition: all .15s ease;
    }
    .plan-cta:hover { filter: brightness(1.1); }
    .plan-cta:disabled { background: rgba(91,140,255,0.3); border-color: var(--border); cursor: not-allowed; }
    .plan-cta.secondary { background: transparent; border: 1px solid var(--border); color: var(--text-muted); }
    .sub-foot {
      text-align: center; color: var(--text-dim); font-size: 11.5px; margin-top: 24px;
    }
    .sub-foot a { color: var(--accent-bright); text-decoration: none; }
    .sub-banner {
      max-width: 720px; margin: 0 auto 20px;
      padding: 12px 16px;
      background: rgba(232,142,168,0.08); border: 1px solid rgba(232,142,168,0.32);
      border-radius: 10px;
      font-size: 12.5px; color: rgb(232 142 168); text-align: center;
    }
    .sub-banner.info { background: rgba(91,140,255,0.06); border-color: rgba(91,140,255,0.32);
      color: var(--accent-bright); }
    .sub-loading { text-align: center; color: var(--text-dim); padding: 60px 0; font-size: 13px; }
    .sub-user { float: right; font-size: 12px; color: var(--text-muted); }
    .sub-user button { background: transparent; border: 1px solid var(--border);
      color: var(--text-muted); padding: 5px 10px; border-radius: 6px; font-size: 11px;
      cursor: pointer; margin-left: 8px; }
  </style>
</head>
<body>
  <div class="sub-wrap">
    <div class="sub-brand">
      <div class="sub-brand-mark">BDI</div>
      <div class="sub-brand-text">Bell Data Intelligence</div>
      <span id="sub-user-info" class="sub-user"></span>
    </div>

    <div id="sub-banner"></div>

    <div class="sub-header">
      <div class="sub-eyebrow">Choose your plan</div>
      <h1 class="sub-title">Subscribe to access Bell</h1>
      <p class="sub-subtitle">
        Bell has no free trial — pick a plan to activate your workspace.
        Credits roll over each cycle. Cancel anytime; data stays frozen, not deleted.
      </p>
    </div>

    <div id="plan-grid" class="plan-grid">
      <div class="sub-loading" style="grid-column: 1 / -1;">Loading plans…</div>
    </div>

    <div class="sub-foot">
      Need an Enterprise quote or have questions? <a href="mailto:hello@bell.qa">hello@bell.qa</a>
    </div>
  </div>

  <script>
    (async function () {
      let mode, me, banner = '';

      // Read URL params for post-checkout messages
      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.get('stripe') === 'cancelled') {
        banner = '<div class="sub-banner">Payment cancelled. Pick a plan to continue.</div>';
      }

      try {
        const r = await fetch('/api/auth/mode');
        mode = await r.json();
      } catch {
        document.getElementById('plan-grid').innerHTML =
          '<div class="sub-loading" style="grid-column:1/-1;">Could not reach the server. Please refresh.</div>';
        return;
      }

      // Local-admin: no subscription needed, send to app
      if (mode.mode === 'local-admin' || !mode.auth_required) {
        window.location.replace('/');
        return;
      }

      // Need Clerk for sign-in state + token
      if (!mode.publishable_key) {
        document.getElementById('plan-grid').innerHTML =
          '<div class="sub-loading" style="grid-column:1/-1;">Subscription not configured.</div>';
        return;
      }

      await new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.async = true; s.crossOrigin = 'anonymous';
        s.setAttribute('data-clerk-publishable-key', mode.publishable_key);
        s.src = 'https://cdn.jsdelivr.net/npm/@clerk/clerk-js@5/dist/clerk.browser.js';
        s.onload = resolve; s.onerror = reject;
        document.head.appendChild(s);
      });
      try { await window.Clerk.load(); } catch (err) {
        document.getElementById('plan-grid').innerHTML =
          '<div class="sub-loading" style="grid-column:1/-1;">Failed to load auth: ' + err.message + '</div>';
        return;
      }
      if (!window.Clerk.user) {
        window.location.replace('/sign-in?after_url=/subscribe');
        return;
      }

      const getToken = async () => window.Clerk.session ? await window.Clerk.session.getToken() : null;
      const authedFetch = async (path, opts = {}) => {
        const token = await getToken();
        return fetch(path, {
          ...opts,
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token,
            ...(opts.headers || {}),
          },
        });
      };

      // Load /me to get user identity + current subscription
      try {
        const r1 = await authedFetch('/api/auth/me');
        const meData = await r1.json();
        me = meData.user;
        document.getElementById('sub-user-info').innerHTML =
          `Signed in as <strong style="color:var(--text)">${me.email}</strong>` +
          ` <button onclick="window.Clerk.signOut().then(()=>window.location.replace('/sign-in'))">Sign out</button>`;
      } catch {
        // Likely user_not_provisioned, retry once after a moment
        await new Promise(r => setTimeout(r, 1500));
        try {
          const r1 = await authedFetch('/api/auth/me');
          const meData = await r1.json();
          me = meData.user;
        } catch {
          document.getElementById('plan-grid').innerHTML =
            '<div class="sub-loading" style="grid-column:1/-1;">Account is still being set up — try again in a moment.</div>';
          return;
        }
      }

      // If subscription is already active, redirect to app
      try {
        const r2 = await authedFetch('/api/billing/subscription');
        const sub = await r2.json();
        if (sub.is_active) {
          window.location.replace('/');
          return;
        }
        if (sub.subscription_status === 'past_due') {
          banner = '<div class="sub-banner">Your subscription is past due. Renew below to restore access.</div>';
        } else if (sub.subscription_status === 'canceled') {
          banner = '<div class="sub-banner info">Your previous subscription was canceled. Subscribe below to unfreeze your data.</div>';
        }
      } catch { /* show subscribe UI anyway */ }

      // Load plans + render
      const planResp = await fetch('/api/billing/plans');
      const { plans } = await planResp.json();
      document.getElementById('sub-banner').innerHTML = banner;
      renderPlans(plans, authedFetch);
    })();

    function renderPlans(plans, authedFetch) {
      const grid = document.getElementById('plan-grid');
      grid.innerHTML = '';
      for (const p of plans) {
        const card = document.createElement('div');
        card.className = 'plan-card' + (p.highlighted ? ' featured' : '');
        const features = (p.features || []).map(f => `<li>${f}</li>`).join('');
        const priceFmt = new Intl.NumberFormat('en-US').format(p.price_qar);
        const notConfigured = !p.stripe_price_id;
        card.innerHTML = `
          ${p.highlighted ? '<div class="plan-badge">Most popular</div>' : ''}
          <div class="plan-name">${p.name}</div>
          <div class="plan-price">
            <span class="currency">QAR</span>${priceFmt}<span class="interval">/${p.interval}</span>
          </div>
          <div class="plan-tagline">${p.tagline}</div>
          <ul class="plan-features">${features}</ul>
          <button class="plan-cta${p.highlighted ? '' : ' secondary'}"
                  data-plan="${p.id}"
                  ${notConfigured ? 'disabled' : ''}>
            ${notConfigured ? 'Not yet configured' : 'Subscribe — QAR ' + priceFmt + '/mo'}
          </button>
        `;
        grid.appendChild(card);
      }
      // Wire up buttons
      grid.querySelectorAll('.plan-cta[data-plan]').forEach(btn => {
        btn.addEventListener('click', async () => {
          btn.disabled = true;
          btn.textContent = 'Opening Stripe…';
          try {
            const r = await authedFetch('/api/billing/checkout', {
              method: 'POST',
              body: JSON.stringify({ plan_id: btn.dataset.plan }),
            });
            const data = await r.json();
            if (data.url) {
              window.location.href = data.url;
            } else {
              btn.disabled = false;
              btn.textContent = 'Could not open checkout: ' + (data.message || data.error);
            }
          } catch (err) {
            btn.disabled = false;
            btn.textContent = 'Error: ' + err.message;
          }
        });
      });
    }
  </script>
</body>
</html>
