<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign up · Bell Data Intelligence</title>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(ellipse 60% 50% at 50% 0%, rgba(91,140,255,0.18) 0%, transparent 65%),
        var(--bg);
    }
    .auth-page { width: 100%; max-width: 440px; padding: 32px 24px; text-align: center; }
    .auth-brand { display: inline-flex; align-items: center; gap: 10px; margin-bottom: 28px; }
    .auth-brand-mark { width: 36px; height: 36px; border-radius: 8px;
      background: linear-gradient(135deg, rgb(91 140 255) 0%, rgb(165 195 255) 100%);
      display: flex; align-items: center; justify-content: center;
      color: white; font-weight: 700; font-size: 13px; letter-spacing: 0.06em; }
    .auth-brand-text { color: var(--text); font-weight: 600; font-size: 15px; }
    .auth-title { font-size: 22px; font-weight: 600; color: var(--text); margin: 0 0 6px; }
    .auth-subtitle { font-size: 13px; color: var(--text-muted); margin: 0 0 28px; }
    .auth-mount { background: rgba(19,24,41,0.4); border: 1px solid var(--border);
      border-radius: 14px; padding: 8px; min-height: 380px; }
    .auth-fallback { padding: 40px 20px; color: var(--text-dim); font-size: 13px; }
    .auth-foot { margin-top: 18px; font-size: 11.5px; color: var(--text-dim); }
    .auth-foot a { color: var(--accent-bright); text-decoration: none; }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-brand">
      <div class="auth-brand-mark">BDI</div>
      <div class="auth-brand-text">Bell Data Intelligence</div>
    </div>
    <h1 class="auth-title">Create your workspace</h1>
    <p class="auth-subtitle">Sign up to start using Bell's intelligence platform.</p>

    <div id="clerk-sign-up" class="auth-mount">
      <div class="auth-fallback">Loading sign-up…</div>
    </div>

    <p class="auth-foot">
      Already have an account? <a href="/sign-in">Sign in</a>
    </p>
  </div>

  <script>
    (async function () {
      let mode;
      try { const r = await fetch('/api/auth/mode'); mode = await r.json(); }
      catch { document.getElementById('clerk-sign-up').innerHTML =
        '<div class="auth-fallback">Could not reach the server. Please refresh.</div>'; return; }

      if (mode.mode === 'local-admin' || !mode.auth_required) {
        window.location.replace('/');
        return;
      }
      if (!mode.publishable_key) {
        document.getElementById('clerk-sign-up').innerHTML =
          '<div class="auth-fallback">Sign-up not configured.<br/>(CLERK_PUBLISHABLE_KEY missing.)</div>';
        return;
      }
      const script = document.createElement('script');
      script.async = true;
      script.crossOrigin = 'anonymous';
      script.setAttribute('data-clerk-publishable-key', mode.publishable_key);
      script.src = 'https://cdn.jsdelivr.net/npm/@clerk/clerk-js@5/dist/clerk.browser.js';
      script.onload = async () => {
        try {
          await window.Clerk.load();
          if (window.Clerk.user) { window.location.replace('/'); return; }
          window.Clerk.mountSignUp(document.getElementById('clerk-sign-up'), {
            // After sign-up, user MUST subscribe — Bell has no free tier.
            afterSignUpUrl: '/subscribe',
            signInUrl: '/sign-in',
          });
        } catch (err) {
          document.getElementById('clerk-sign-up').innerHTML =
            '<div class="auth-fallback">Failed to load sign-up: ' + (err.message || err) + '</div>';
        }
      };
      script.onerror = () => {
        document.getElementById('clerk-sign-up').innerHTML =
          '<div class="auth-fallback">Failed to load sign-up (network).</div>';
      };
      document.head.appendChild(script);
    })();
  </script>
</body>
</html>
